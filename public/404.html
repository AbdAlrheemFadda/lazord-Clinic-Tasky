<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>لازورد - إعادة توجيه</title>
  <script>
    // GitHub Pages SPA redirect: preserve path and redirect to index.html
    const repo = '/lazord-Clinic-Task';
    const path = window.location.pathname.replace(repo, '') || '/';
    const search = window.location.search;
    const hash = window.location.hash;
    window.location.replace(
      repo + '/?p=' + encodeURIComponent(path + search) + hash
    );
  </script>
</head>
<body></body>
</html>
